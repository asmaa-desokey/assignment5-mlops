name: Full CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train model
        run: python train.py

      - name: Upload Run ID and MLflow files
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: |
            model_info.txt
            mlruns

  deploy:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download Run ID and MLflow files
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Check accuracy threshold
        run: python check_threshold.py

      - name: Mock Docker Build
        run: echo "Building Docker image for Run ID: $(cat model_info.txt)"